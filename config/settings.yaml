# 数据源配置
# 可选: "yfinance" (先尝试yfinance, 失败后依次尝试metals.live/gold-api → 模拟)
#       "api"     (尝试metals.live/gold-api → 模拟)
#       "simulated" (纯确定性模拟, 无网络请求)
data_source: "simulated"

# 报告模板路径
report_template: "templates/report.html"

# 输出目录
output_dir: "reports"

# 获取频率
fetch_interval: "daily"

# 货币单位
currency: "USD"

# 日志级别: DEBUG, INFO, WARNING, ERROR
log_level: "INFO"