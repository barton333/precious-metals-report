# 数据源配置
# 可选: "api"        — 优先从 gold-api.com 获取实时数据（黄金/白银/铂金/钯金），其余 + 失败时用确定性模拟
#       "simulated"  — 纯确定性模拟（基于 typical_price + 日期 seed，无需网络，同日运行结果一致）
data_source: "api"

# 报告模板路径
report_template: "templates/report.html"

# 输出目录
output_dir: "reports"

# 获取频率
fetch_interval: "daily"

# 货币单位
currency: "USD"

# 日志级别: DEBUG, INFO, WARNING, ERROR
log_level: "INFO"